<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MedScribe AI">
  <!-- Brand tile: matches the slate-900 app header -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>

  <!-- ECG / vital-sign waveform — reads as "medical monitoring"; the
       wave shape also nods to voice/audio. Bold strokes for 16px legibility. -->
  <path d="M8 36 L18 36 L22 26 L30 46 L38 18 L42 36 L56 36"
        fill="none"
        stroke="#38BDF8"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Small red accent dot — nods to live recording / streaming feature -->
  <circle cx="50" cy="14" r="3.5" fill="#F43F5E"/>
</svg>
